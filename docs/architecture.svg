<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 700" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#444"/>
    </marker>
    <marker id="arr-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1e6fcf"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0d8a4a"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c0392b"/>
    </marker>
  </defs>

  <text x="550" y="32" text-anchor="middle" font-size="20" font-weight="700">Cambly-iOS-Vendor-Binaries — Architecture overview</text>
  <text x="550" y="54" text-anchor="middle" font-size="13" fill="#666">How a third-party SDK gets from upstream source into a Cambly iOS app build</text>

  <!-- ENGINEER -->
  <g>
    <rect x="40" y="100" width="220" height="100" rx="10" fill="#fff7e0" stroke="#d4a017" stroke-width="2"/>
    <text x="150" y="128" text-anchor="middle" font-weight="700" fill="#d4a017">Engineer (you)</text>
    <line x1="60" y1="140" x2="240" y2="140" stroke="#d4a017" stroke-dasharray="3 2"/>
    <text x="60" y="160" font-size="11" fill="#444">Triggers manually via</text>
    <text x="60" y="176" font-size="11" fill="#222">Actions → Build &lt;Vendor&gt;</text>
    <text x="60" y="192" font-size="11" fill="#222">→ Run workflow</text>
  </g>

  <!-- UPSTREAM SDK -->
  <g>
    <rect x="40" y="280" width="220" height="120" rx="10" fill="#f0e6ff" stroke="#7e57c2" stroke-width="2"/>
    <text x="150" y="308" text-anchor="middle" font-weight="700" fill="#7e57c2">Upstream SDK</text>
    <text x="150" y="324" text-anchor="middle" font-size="11" fill="#666">(public or Cambly fork)</text>
    <line x1="60" y1="336" x2="240" y2="336" stroke="#7e57c2" stroke-dasharray="3 2"/>
    <text x="60" y="356" font-size="11" fill="#444">e.g. airbnb/lottie-ios</text>
    <text x="60" y="372" font-size="11" fill="#444">Cambly/facebook-ios-sdk</text>
    <text x="60" y="388" font-size="11" fill="#444">getsentry/sentry-cocoa</text>
  </g>

  <!-- SIGNING REPO -->
  <g>
    <rect x="40" y="450" width="220" height="120" rx="10" fill="#fde2e2" stroke="#c0392b" stroke-width="2"/>
    <text x="150" y="478" text-anchor="middle" font-weight="700" fill="#c0392b">Cambly-Swift-Signing</text>
    <text x="150" y="494" text-anchor="middle" font-size="11" fill="#666">(encrypted private repo)</text>
    <line x1="60" y1="506" x2="240" y2="506" stroke="#c0392b" stroke-dasharray="3 2"/>
    <text x="60" y="526" font-size="11" fill="#444">Apple Distribution cert</text>
    <text x="60" y="542" font-size="11" fill="#444">(encrypted .cer + .p12)</text>
    <text x="60" y="558" font-size="11" fill="#666" font-style="italic">Decryption pwd: MATCH_PASSWORD</text>
  </g>

  <!-- GITHUB ACTIONS WORKFLOW -->
  <g>
    <rect x="370" y="100" width="360" height="270" rx="10" fill="#f0f6ff" stroke="#1e6fcf" stroke-width="2"/>
    <text x="550" y="128" text-anchor="middle" font-weight="700" fill="#1e6fcf">GitHub Actions runner (macos-15)</text>
    <text x="550" y="144" text-anchor="middle" font-size="11" fill="#666">build-&lt;vendor&gt;.yml — workflow_dispatch</text>
    <line x1="390" y1="156" x2="710" y2="156" stroke="#1e6fcf" stroke-dasharray="3 2"/>

    <text x="390" y="178" font-size="12" font-weight="600" fill="#222">① Checkout this repo + upstream</text>

    <text x="390" y="202" font-size="12" font-weight="600" fill="#222">② setup-signing composite action</text>
    <text x="402" y="218" font-size="11" fill="#555">ssh-agent + fastlane match → cert in keychain</text>

    <text x="390" y="242" font-size="12" font-weight="600" fill="#222">③ make all VENDOR=… VERSION=…</text>
    <text x="402" y="258" font-size="11" fill="#555">xcodebuild archive ×2 → create-xcframework</text>
    <text x="402" y="273" font-size="11" fill="#555">→ codesign --sign $SIGNING_IDENTITY</text>
    <text x="402" y="288" font-size="11" fill="#555">→ zip + sha256</text>

    <text x="390" y="312" font-size="12" font-weight="600" fill="#222">④ Patch Package.swift (url + sha)</text>
    <text x="402" y="328" font-size="11" fill="#555">+ commit to main</text>

    <text x="390" y="352" font-size="12" font-weight="600" fill="#222">⑤ gh release create &lt;vendor&gt;-&lt;ver&gt;…</text>
  </g>

  <!-- RELEASE ASSETS -->
  <g>
    <rect x="800" y="100" width="260" height="200" rx="10" fill="#e6f4ea" stroke="#0d8a4a" stroke-width="2"/>
    <text x="930" y="128" text-anchor="middle" font-weight="700" fill="#0d8a4a">GitHub Release Assets</text>
    <text x="930" y="144" text-anchor="middle" font-size="11" fill="#666">(this repo, public)</text>
    <line x1="820" y1="156" x2="1040" y2="156" stroke="#0d8a4a" stroke-dasharray="3 2"/>
    <text x="820" y="178" font-size="11" fill="#222">lottie-4.6.0-signed/</text>
    <text x="836" y="194" font-size="11" fill="#444">└ Lottie.xcframework.zip</text>
    <text x="820" y="216" font-size="11" fill="#222">facebook-v11.0.1-cambly/</text>
    <text x="836" y="232" font-size="11" fill="#444">├ FBSDKCoreKit.xcframework.zip</text>
    <text x="836" y="248" font-size="11" fill="#444">├ FBSDKCoreKit_Basics.xcframework.zip</text>
    <text x="836" y="264" font-size="11" fill="#444">└ FBSDKLoginKit.xcframework.zip</text>
    <text x="820" y="285" font-size="11" fill="#666" font-style="italic">…one tag per vendor release…</text>
  </g>

  <!-- PACKAGE SWIFT -->
  <g>
    <rect x="800" y="340" width="260" height="120" rx="10" fill="#fffaf0" stroke="#e67e22" stroke-width="2"/>
    <text x="930" y="368" text-anchor="middle" font-weight="700" fill="#e67e22">Package.swift (this repo)</text>
    <line x1="820" y1="380" x2="1040" y2="380" stroke="#e67e22" stroke-dasharray="3 2"/>
    <text x="820" y="402" font-size="11" font-family="ui-monospace, monospace" fill="#222">.binaryTarget(</text>
    <text x="820" y="416" font-size="11" font-family="ui-monospace, monospace" fill="#222">  name: "Lottie",</text>
    <text x="820" y="430" font-size="11" font-family="ui-monospace, monospace" fill="#222">  url: "…releases/download/</text>
    <text x="820" y="444" font-size="11" font-family="ui-monospace, monospace" fill="#222">       lottie-4.6.0-signed/…",</text>
  </g>

  <!-- CAMBLY-SWIFT CONSUMER -->
  <g>
    <rect x="370" y="450" width="690" height="200" rx="10" fill="#e6f7ff" stroke="#0080a8" stroke-width="2"/>
    <text x="715" y="478" text-anchor="middle" font-weight="700" fill="#0080a8">Cambly-Swift (consumer)</text>
    <text x="715" y="494" text-anchor="middle" font-size="11" fill="#666">github.com/Cambly/Cambly-Swift</text>
    <line x1="390" y1="506" x2="1040" y2="506" stroke="#0080a8" stroke-dasharray="3 2"/>

    <text x="390" y="528" font-size="12" font-weight="600" fill="#222">project_files/swift_packages.yml</text>
    <text x="402" y="544" font-size="11" font-family="ui-monospace, monospace" fill="#444">CamblyVendorBinaries:</text>
    <text x="402" y="558" font-size="11" font-family="ui-monospace, monospace" fill="#444">  url: ...Cambly-iOS-Vendor-Binaries</text>
    <text x="402" y="572" font-size="11" font-family="ui-monospace, monospace" fill="#444">  revision: starscream-4.0.8-signed</text>

    <text x="700" y="528" font-size="12" font-weight="600" fill="#222">SwiftPM resolve:</text>
    <text x="712" y="544" font-size="11" fill="#444">1. Clone this repo at the pinned revision</text>
    <text x="712" y="558" font-size="11" fill="#444">2. Read Package.swift → list binaryTargets</text>
    <text x="712" y="572" font-size="11" fill="#444">3. Download each .xcframework.zip from Releases</text>
    <text x="712" y="586" font-size="11" fill="#444">4. Verify sha256 → unzip into SPM cache</text>
    <text x="712" y="600" font-size="11" fill="#444">5. App builds + links against cached frameworks</text>
    <text x="390" y="624" font-size="11" fill="#666" font-style="italic">Result: no source recompilation of vendor SDKs across clean builds.</text>
  </g>

  <!-- ==================== ARROWS ==================== -->
  <!-- Engineer → Workflow -->
  <line x1="260" y1="150" x2="365" y2="150" stroke="#d4a017" stroke-width="2" marker-end="url(#arr)"/>
  <text x="270" y="142" font-size="11" fill="#d4a017" font-style="italic">trigger</text>

  <!-- Upstream SDK → Workflow (step ①) -->
  <line x1="260" y1="340" x2="380" y2="210" stroke="#7e57c2" stroke-width="2" marker-end="url(#arr)"/>
  <text x="245" y="290" font-size="11" fill="#7e57c2" font-style="italic">git clone</text>
  <text x="245" y="305" font-size="11" fill="#7e57c2" font-style="italic">--branch ver</text>

  <!-- Signing repo → Workflow (step ②) -->
  <line x1="260" y1="510" x2="380" y2="230" stroke="#c0392b" stroke-width="2" marker-end="url(#arr-red)"/>
  <text x="265" y="430" font-size="11" fill="#c0392b" font-style="italic">SSH clone + decrypt</text>
  <text x="265" y="445" font-size="11" fill="#c0392b" font-style="italic">cert → keychain</text>

  <!-- Workflow → Release Assets (step ⑤) -->
  <line x1="730" y1="360" x2="800" y2="195" stroke="#0d8a4a" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="725" y="280" font-size="11" fill="#0d8a4a" font-style="italic">upload</text>
  <text x="725" y="295" font-size="11" fill="#0d8a4a" font-style="italic">xcframework.zip</text>

  <!-- Workflow → Package.swift (step ④) -->
  <line x1="730" y1="330" x2="800" y2="395" stroke="#e67e22" stroke-width="2" marker-end="url(#arr)"/>
  <text x="735" y="380" font-size="11" fill="#e67e22" font-style="italic">commit</text>

  <!-- Package.swift → consumer (binaryTarget url pointed at Release Asset) -->
  <line x1="930" y1="460" x2="930" y2="450" stroke="#e67e22" stroke-width="2"/>
  <line x1="930" y1="650" x2="930" y2="660" stroke="#0080a8" stroke-width="2"/>

  <!-- Consumer → fetch Package.swift -->
  <path d="M 700 470 C 700 410 750 380 800 400" stroke="#0080a8" stroke-width="2" fill="none" marker-end="url(#arr-blue)"/>
  <text x="690" y="430" font-size="11" fill="#0080a8" font-style="italic">SPM read</text>

  <!-- Consumer → fetch Release Assets -->
  <path d="M 880 460 C 880 380 880 320 905 305" stroke="#0080a8" stroke-width="2" fill="none" marker-end="url(#arr-blue)"/>
  <text x="888" y="420" font-size="11" fill="#0080a8" font-style="italic">SPM download</text>
  <text x="888" y="435" font-size="11" fill="#0080a8" font-style="italic">zip + sha verify</text>
</svg>
