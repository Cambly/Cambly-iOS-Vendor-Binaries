name: Build RxSwift

# Manual trigger only. To cut a new RxSwift release:
#   Actions → Build RxSwift → Run workflow → (set version) → Run.
#
# Produces a GitHub Release tagged `rxswift-<version>` containing the
# RxSwift xcframework zip. Then patches Package.swift's `// === rxswift ===`
# section with the new url + checksum and commits it to main.
#
# History: RxSwift previously lived in a separate Cambly-RxSwift-Binary repo
# (introduced in MOB-186, PR Cambly-Swift#3962). Consolidated into this
# monorepo on 2026-05-28 to reduce maintenance overhead — same signing
# pipeline, same `tag_suffix:-signed` convention as the other vendors.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Upstream tag on ReactiveX/RxSwift (e.g. 6.9.1)"
        required: true
        type: string
        default: 6.9.1
      tag_suffix:
        description: "Optional suffix appended to the release tag, e.g. -signed or -r2. Used when republishing the same upstream version (e.g. adding SDK signature). Leave empty for the very first release of a given upstream version."
        required: false
        type: string
        default: ""

permissions:
  contents: write

concurrency:
  group: package-update
  cancel-in-progress: false

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout binary repo (this)
        uses: actions/checkout@v4

      - name: Select Xcode (prefer 26.x, fall back to latest installed)
        run: |
          XCODE=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -n 1)
          if [ -z "$XCODE" ]; then
            XCODE=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -n 1)
          fi
          if [ -z "$XCODE" ]; then
            echo "❌ No Xcode found in /Applications/"; ls /Applications | grep -i xcode || true; exit 1
          fi
          echo "Selecting: $XCODE"
          sudo xcode-select -s "$XCODE"
          xcodebuild -version

      - name: Set up signing
        uses: ./.github/actions/setup-signing
        with:
          ssh-private-key: ${{ secrets.MATCH_GIT_SSH_PRIVATE_KEY }}
          match-password: ${{ secrets.MATCH_PASSWORD }}

      - name: Build + sign RxSwift xcframework via Makefile
        env:
          SIGNING_IDENTITY: ${{ secrets.SIGNING_IDENTITY }}
        run: |
          make all VENDOR=rxswift VERSION=${{ inputs.version }} \
            UPSTREAM_REPO_URL=https://github.com/ReactiveX/RxSwift.git

      - name: Compute checksums
        id: checksums
        run: |
          cd build/artifacts
          {
            for f in *.xcframework.zip; do
              name="${f%.xcframework.zip}"
              sha=$(swift package compute-checksum "$f")
              echo "${name}_sha=${sha}"
            done
          } >> "$GITHUB_OUTPUT"

      - name: Patch Package.swift
        env:
          VENDOR: rxswift
          ASSETS_TAG: rxswift-${{ inputs.version }}${{ inputs.tag_suffix }}
          RxSwift_SHA: ${{ steps.checksums.outputs.RxSwift_sha }}
        run: python3 .github/scripts/patch_package_swift.py

      - name: Commit Package.swift update + push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Package.swift
          git diff --staged --quiet && { echo "No Package.swift changes; nothing to commit"; exit 0; }
          git commit -m "Update RxSwift binaries to ${{ inputs.version }}"
          for attempt in 1 2 3; do
            git fetch origin main
            git rebase origin/main || { echo "❌ rebase conflict on attempt $attempt"; git rebase --abort; exit 1; }
            if git push origin HEAD:main; then
              echo "✓ pushed on attempt $attempt"; exit 0
            fi
            echo "push rejected; retrying after rebase (attempt $attempt/3)"
            sleep 5
          done
          echo "❌ push failed after 3 attempts"; exit 1

      - name: Create GitHub release with assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="rxswift-${{ inputs.version }}${{ inputs.tag_suffix }}"
          gh release delete "$tag" --yes --cleanup-tag 2>/dev/null || true
          gh release create "$tag" \
            build/artifacts/*.xcframework.zip \
            --title "$tag" \
            --notes "Prebuilt xcframework for ReactiveX/RxSwift@${{ inputs.version }}. Built from upstream's \`Rx.xcodeproj\` \`RxSwift\` scheme with BUILD_LIBRARY_FOR_DISTRIBUTION=YES + signed with the team's Apple Distribution identity. Migrated from the previous Cambly-RxSwift-Binary repo on 2026-05-28."
