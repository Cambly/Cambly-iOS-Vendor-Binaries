name: Build Lottie

# Manual trigger only. To cut a new Lottie release:
#   Actions → Build Lottie → Run workflow → (set version) → Run.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Upstream tag on airbnb/lottie-ios (e.g. 4.5.2)"
        required: true
        type: string
        default: 4.5.2
      tag_suffix:
        description: "Optional suffix appended to the release tag, e.g. -signed or -r2. Used when republishing the same upstream version (e.g. adding SDK signature). Leave empty for the very first release of a given upstream version."
        required: false
        type: string
        default: ""

permissions:
  contents: write

concurrency:
  group: package-update
  cancel-in-progress: false

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout binary repo (this)
        uses: actions/checkout@v4

      - name: Select Xcode (prefer 26.x, fall back to latest installed)
        run: |
          XCODE=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -n 1)
          if [ -z "$XCODE" ]; then
            XCODE=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -n 1)
          fi
          if [ -z "$XCODE" ]; then
            echo "❌ No Xcode found in /Applications/"; ls /Applications | grep -i xcode || true; exit 1
          fi
          echo "Selecting: $XCODE"
          sudo xcode-select -s "$XCODE"
          xcodebuild -version

      # ─── SDK Signature steps (ITMS-91065 fix) ───────────────────────────
      # Apple requires xcframeworks of "commonly used third-party SDKs" (Lottie
      # is on that list) to be signed with the team's Apple Distribution
      # identity. The signing identity comes from Cambly-Swift-Signing repo
      # via fastlane match, reusing the same machine-user (`cambly-machine-user-ios`)
      # SSH key that Cambly-Swift's CircleCI uses. ssh-agent is started here so
      # the SSH-form git_url in `sync_code_signing` can clone the encrypted
      # signing repo.
      #
      # After this step runs, the runner's default keychain holds:
      #   Apple Distribution: Cambly Inc. (ZNP9AYBP23)
      # which the Makefile's `sign-xcframeworks` target then uses via codesign.
      - name: Set up SSH agent (Cambly-Swift-Signing access)
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.MATCH_GIT_SSH_PRIVATE_KEY }}

      - name: Install fastlane
        run: gem install fastlane --no-document

      # Unlock the runner's login.keychain explicitly before match runs.
      # macos-15 runner ships login.keychain with empty password and unlocked
      # at boot, but sync_code_signing's set-key-partition-list call still
      # fails with "item could not be found" — most likely because the
      # keychain auto-relocks between sessions. Force-unlocking once here
      # makes subsequent security operations deterministic.
      - name: Unlock login.keychain
        run: |
          security unlock-keychain -p "" "$HOME/Library/Keychains/login.keychain-db"
          security list-keychains -d user
          security default-keychain

      - name: Sync Apple Distribution cert from Cambly-Swift-Signing
        env:
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
        run: |
          fastlane run sync_code_signing \
            type:appstore \
            readonly:true \
            skip_provisioning_profiles:true \
            git_url:"git@github.com:Cambly/Cambly-Swift-Signing.git" \
            app_identifier:com.cambly.Cambly \
            keychain_name:login.keychain-db \
            keychain_password:""

      # Diagnostic: inspect what match actually deposited into login.keychain.
      # If `find-identity` shows the cert, we're set. If only `find-certificate`
      # shows the cert but `find-identity` doesn't, the private key didn't
      # import properly. Then force set-key-partition-list manually (match's
      # own call inside sync_code_signing reportedly fails).
      - name: Verify cert installed + force-configure partition list
        run: |
          echo "=== Certs matching 'Apple Distribution' in login.keychain:"
          security find-certificate -a -c "Apple Distribution" \
            "$HOME/Library/Keychains/login.keychain-db" \
            | grep -E "labl|alis|subj" || echo "(no Apple Distribution cert found in login.keychain)"
          echo ""
          echo "=== codesign-capable identities (login.keychain only):"
          security find-identity -v -p codesigning "$HOME/Library/Keychains/login.keychain-db" || true
          echo ""
          echo "=== codesign-capable identities (all keychains in search list):"
          security find-identity -v -p codesigning || true
          echo ""
          echo "=== Force-set partition list on login.keychain (allow apple-tool / apple use without UI prompt):"
          security set-key-partition-list \
            -S apple-tool:,apple: -s -k "" \
            "$HOME/Library/Keychains/login.keychain-db" \
            && echo "✓ partition list set" \
            || echo "✗ partition list set FAILED with exit $?"

      - name: Build + sign Lottie xcframework via Makefile
        env:
          SIGNING_IDENTITY: ${{ secrets.SIGNING_IDENTITY }}
        run: |
          make all VENDOR=lottie VERSION=${{ inputs.version }} \
            UPSTREAM_REPO_URL=https://github.com/airbnb/lottie-ios.git

      - name: Compute checksums
        id: checksums
        run: |
          cd build/artifacts
          {
            for f in *.xcframework.zip; do
              name="${f%.xcframework.zip}"
              sha=$(swift package compute-checksum "$f")
              echo "${name}_sha=${sha}"
            done
          } >> "$GITHUB_OUTPUT"

      - name: Patch Package.swift
        env:
          VENDOR: lottie
          ASSETS_TAG: lottie-${{ inputs.version }}${{ inputs.tag_suffix }}
          Lottie_SHA: ${{ steps.checksums.outputs.Lottie_sha }}
        run: python3 .github/scripts/patch_package_swift.py

      # Race protection: see build-facebook.yml for the explanation. tl;dr
      # actions/checkout pins to trigger-time SHA, so rebase onto current
      # origin/main before push to handle concurrent vendor builds.
      - name: Commit Package.swift update + push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Package.swift
          git diff --staged --quiet && { echo "No Package.swift changes; nothing to commit"; exit 0; }
          git commit -m "Update Lottie binaries to ${{ inputs.version }}"
          for attempt in 1 2 3; do
            git fetch origin main
            git rebase origin/main || { echo "❌ rebase conflict on attempt $attempt"; git rebase --abort; exit 1; }
            if git push origin HEAD:main; then
              echo "✓ pushed on attempt $attempt"; exit 0
            fi
            echo "push rejected; retrying after rebase (attempt $attempt/3)"
            sleep 5
          done
          echo "❌ push failed after 3 attempts"; exit 1

      - name: Create GitHub release with assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="lottie-${{ inputs.version }}${{ inputs.tag_suffix }}"
          gh release delete "$tag" --yes --cleanup-tag 2>/dev/null || true
          gh release create "$tag" \
            build/artifacts/*.xcframework.zip \
            --title "$tag" \
            --notes "Prebuilt xcframework for airbnb/lottie-ios@${{ inputs.version }}. Built from upstream's \`Lottie (iOS)\` xcodeproj scheme with BUILD_LIBRARY_FOR_DISTRIBUTION=YES."
