name: Build Lottie

# Manual trigger only. To cut a new Lottie release:
#   Actions → Build Lottie → Run workflow → (set version) → Run.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Upstream tag on airbnb/lottie-ios (e.g. 4.5.2)"
        required: true
        type: string
        default: 4.5.2
      tag_suffix:
        description: "Optional suffix appended to the release tag, e.g. -signed or -r2. Used when republishing the same upstream version (e.g. adding SDK signature). Leave empty for the very first release of a given upstream version."
        required: false
        type: string
        default: ""

permissions:
  contents: write

concurrency:
  group: package-update
  cancel-in-progress: false

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout binary repo (this)
        uses: actions/checkout@v4

      - name: Select Xcode (prefer 26.x, fall back to latest installed)
        run: |
          XCODE=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -n 1)
          if [ -z "$XCODE" ]; then
            XCODE=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -n 1)
          fi
          if [ -z "$XCODE" ]; then
            echo "❌ No Xcode found in /Applications/"; ls /Applications | grep -i xcode || true; exit 1
          fi
          echo "Selecting: $XCODE"
          sudo xcode-select -s "$XCODE"
          xcodebuild -version

      # Set up everything required for codesigning xcframeworks against the
      # team's Apple Distribution identity. See .github/actions/setup-signing
      # for details. Caveat: this composite action sets MATCH_KEYCHAIN_NAME /
      # MATCH_KEYCHAIN_PASSWORD via $GITHUB_ENV, and fastlane_tmp_keychain
      # is set as the runner's default keychain, so the Makefile's
      # codesign call afterwards finds the cert without further configuration.
      - name: Set up signing
        uses: ./.github/actions/setup-signing
        with:
          ssh-private-key: ${{ secrets.MATCH_GIT_SSH_PRIVATE_KEY }}
          match-password: ${{ secrets.MATCH_PASSWORD }}

      - name: Build + sign Lottie xcframework via Makefile
        env:
          SIGNING_IDENTITY: ${{ secrets.SIGNING_IDENTITY }}
        run: |
          make all VENDOR=lottie VERSION=${{ inputs.version }} \
            UPSTREAM_REPO_URL=https://github.com/airbnb/lottie-ios.git

      - name: Compute checksums
        id: checksums
        run: |
          cd build/artifacts
          {
            for f in *.xcframework.zip; do
              name="${f%.xcframework.zip}"
              sha=$(swift package compute-checksum "$f")
              echo "${name}_sha=${sha}"
            done
          } >> "$GITHUB_OUTPUT"

      - name: Patch Package.swift
        env:
          VENDOR: lottie
          ASSETS_TAG: lottie-${{ inputs.version }}${{ inputs.tag_suffix }}
          Lottie_SHA: ${{ steps.checksums.outputs.Lottie_sha }}
        run: python3 .github/scripts/patch_package_swift.py

      # Race protection: see build-facebook.yml for the explanation. tl;dr
      # actions/checkout pins to trigger-time SHA, so rebase onto current
      # origin/main before push to handle concurrent vendor builds.
      - name: Commit Package.swift update + push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Package.swift
          git diff --staged --quiet && { echo "No Package.swift changes; nothing to commit"; exit 0; }
          git commit -m "Update Lottie binaries to ${{ inputs.version }}"
          for attempt in 1 2 3; do
            git fetch origin main
            git rebase origin/main || { echo "❌ rebase conflict on attempt $attempt"; git rebase --abort; exit 1; }
            if git push origin HEAD:main; then
              echo "✓ pushed on attempt $attempt"; exit 0
            fi
            echo "push rejected; retrying after rebase (attempt $attempt/3)"
            sleep 5
          done
          echo "❌ push failed after 3 attempts"; exit 1

      - name: Create GitHub release with assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="lottie-${{ inputs.version }}${{ inputs.tag_suffix }}"
          gh release delete "$tag" --yes --cleanup-tag 2>/dev/null || true
          gh release create "$tag" \
            build/artifacts/*.xcframework.zip \
            --title "$tag" \
            --notes "Prebuilt xcframework for airbnb/lottie-ios@${{ inputs.version }}. Built from upstream's \`Lottie (iOS)\` xcodeproj scheme with BUILD_LIBRARY_FOR_DISTRIBUTION=YES."
