name: Build KeychainAccess

# Manual trigger only. To cut a new KeychainAccess release:
#   Actions → Build KeychainAccess → Run workflow → (set version) → Run.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Upstream tag on kishikawakatsumi/KeychainAccess (literal git tag incl. 'v' prefix, e.g. v4.2.2)"
        required: true
        type: string
        default: v4.2.2

permissions:
  contents: write

concurrency:
  group: package-update
  cancel-in-progress: false

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout binary repo (this)
        uses: actions/checkout@v4

      - name: Select Xcode (prefer 26.x, fall back to latest installed)
        run: |
          XCODE=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -n 1)
          if [ -z "$XCODE" ]; then
            XCODE=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -n 1)
          fi
          [ -n "$XCODE" ] || { echo "❌ No Xcode found"; exit 1; }
          echo "Selecting: $XCODE"
          sudo xcode-select -s "$XCODE"
          xcodebuild -version

      - name: Build KeychainAccess xcframework via Makefile
        run: |
          make all VENDOR=keychainaccess VERSION=${{ inputs.version }} \
            UPSTREAM_REPO_URL=https://github.com/kishikawakatsumi/KeychainAccess.git

      - name: Compute checksums
        id: checksums
        run: |
          cd build/artifacts
          {
            for f in *.xcframework.zip; do
              name="${f%.xcframework.zip}"
              sha=$(swift package compute-checksum "$f")
              echo "${name}_sha=${sha}"
            done
          } >> "$GITHUB_OUTPUT"

      - name: Patch Package.swift
        env:
          VENDOR: keychainaccess
          ASSETS_TAG: keychainaccess-${{ inputs.version }}
          KeychainAccess_SHA: ${{ steps.checksums.outputs.KeychainAccess_sha }}
        run: python3 .github/scripts/patch_package_swift.py

      - name: Commit Package.swift update + push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Package.swift
          git diff --staged --quiet && { echo "No Package.swift changes; nothing to commit"; exit 0; }
          git commit -m "Update KeychainAccess binaries to ${{ inputs.version }}"
          for attempt in 1 2 3; do
            git fetch origin main
            git rebase origin/main || { echo "❌ rebase conflict on attempt $attempt"; git rebase --abort; exit 1; }
            if git push origin HEAD:main; then
              echo "✓ pushed on attempt $attempt"; exit 0
            fi
            echo "push rejected; retrying after rebase (attempt $attempt/3)"
            sleep 5
          done
          echo "❌ push failed after 3 attempts"; exit 1

      - name: Create GitHub release with assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="keychainaccess-${{ inputs.version }}"
          gh release delete "$tag" --yes --cleanup-tag 2>/dev/null || true
          gh release create "$tag" \
            build/artifacts/*.xcframework.zip \
            --title "$tag" \
            --notes "Prebuilt xcframework for kishikawakatsumi/KeychainAccess@${{ inputs.version }}. Built from upstream's \`Lib/KeychainAccess.xcodeproj\` \`KeychainAccess\` scheme with BUILD_LIBRARY_FOR_DISTRIBUTION=YES."
