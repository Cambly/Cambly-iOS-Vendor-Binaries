name: Build Facebook

# Manual trigger only. To cut a new Facebook release:
#   Actions → Build Facebook → Run workflow → (set version) → Run.
#
# Produces a GitHub Release tagged `facebook-<version>` containing the 6
# xcframework zips that make up the FacebookLogin product. Then patches
# Package.swift's `// === facebook ===` section with the new urls + checksums
# and commits it to main.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Upstream tag/ref on Cambly/facebook-ios-sdk (e.g. v11.0.1-cambly)"
        required: true
        type: string
        default: v11.0.1-cambly

permissions:
  contents: write   # commit Package.swift + create release + upload assets

# Serialize all build-*.yml workflows. Without this, two concurrent runs would
# race on `git push origin main` (one wins, the other fails to push). Vendor
# builds are slow (15-30 min) but rare, so queuing is fine.
concurrency:
  group: package-update
  cancel-in-progress: false

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout binary repo (this)
        uses: actions/checkout@v4

      - name: Select Xcode (prefer 26.x, fall back to latest installed)
        run: |
          # macos-15 runner ships several Xcode versions in /Applications/.
          # Prefer the latest 26.x (matches Cambly-Swift's .xcode-version 26.4.1
          # generation); fall back to whatever the latest installed Xcode is.
          XCODE=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -n 1)
          if [ -z "$XCODE" ]; then
            XCODE=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -n 1)
          fi
          if [ -z "$XCODE" ]; then
            echo "❌ No Xcode found in /Applications/"; ls /Applications | grep -i xcode || true; exit 1
          fi
          echo "Selecting: $XCODE"
          sudo xcode-select -s "$XCODE"
          xcodebuild -version

      - name: Build all xcframeworks via Makefile
        # CI clones the Cambly fork over HTTPS using SOURCE_REPO_TOKEN (no SSH
        # keys on the macos-15 runner). Local devs use the SSH default in the
        # Makefile.
        run: |
          make all VENDOR=facebook VERSION=${{ inputs.version }} \
            UPSTREAM_REPO_URL=https://x-access-token:${{ secrets.SOURCE_REPO_TOKEN }}@github.com/Cambly/facebook-ios-sdk.git

      - name: Compute checksums
        id: checksums
        run: |
          cd build/artifacts
          {
            for f in *.xcframework.zip; do
              name="${f%.xcframework.zip}"
              sha=$(swift package compute-checksum "$f")
              echo "${name}_sha=${sha}"
            done
          } >> "$GITHUB_OUTPUT"

      - name: Patch Package.swift
        env:
          VENDOR: facebook
          ASSETS_TAG: facebook-${{ inputs.version }}
          FBSDKCoreKit_Basics_SHA: ${{ steps.checksums.outputs.FBSDKCoreKit_Basics_sha }}
          FBSDKCoreKit_SHA:        ${{ steps.checksums.outputs.FBSDKCoreKit_sha }}
          FBSDKLoginKit_SHA:       ${{ steps.checksums.outputs.FBSDKLoginKit_sha }}
        run: python3 .github/scripts/patch_package_swift.py

      # Order matters: commit Package.swift FIRST so that when `gh release create`
      # auto-creates the tag, it points at the commit with the patched urls +
      # checksums. If we created the release first, the tag would stop at the
      # parent commit (with PENDING urls), causing SwiftPM consumers to hit 404.
      #
      # Race protection: `actions/checkout` pins to the SHA that triggered the
      # workflow, so concurrent builds of different vendors (e.g. Alamofire and
      # Lottie kicked off back-to-back) can both checkout the same base and
      # only the first push wins. Before pushing, rebase onto current origin/main
      # so this run's vendor-specific Package.swift patch lands cleanly on top
      # of whatever just happened. Patches target distinct `// === <vendor> ===`
      # sections so rebase conflicts are unlikely.
      - name: Commit Package.swift update + push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Package.swift
          git diff --staged --quiet && { echo "No Package.swift changes; nothing to commit"; exit 0; }
          git commit -m "Update Facebook binaries to ${{ inputs.version }}"
          for attempt in 1 2 3; do
            git fetch origin main
            git rebase origin/main || { echo "❌ rebase conflict on attempt $attempt"; git rebase --abort; exit 1; }
            if git push origin HEAD:main; then
              echo "✓ pushed on attempt $attempt"; exit 0
            fi
            echo "push rejected; retrying after rebase (attempt $attempt/3)"
            sleep 5
          done
          echo "❌ push failed after 3 attempts"; exit 1

      - name: Create GitHub release with assets
        # Workflow is intentionally re-runnable for the same version (e.g. while
        # debugging the build pipeline). Delete any prior release + tag for this
        # version first so `gh release create` doesn't 422 on a name collision.
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="facebook-${{ inputs.version }}"
          gh release delete "$tag" --yes --cleanup-tag 2>/dev/null || true
          gh release create "$tag" \
            build/artifacts/*.xcframework.zip \
            --title "$tag" \
            --notes "Prebuilt xcframeworks for Cambly/facebook-ios-sdk@${{ inputs.version }}. Built from fork's FBSDK*-Dynamic xcodeproj schemes with BUILD_LIBRARY_FOR_DISTRIBUTION=YES."
